server {
    listen 80;
    server_name _;

    # Resolver externo para resolver FQDN Coolify (sslip.io embeds IP, fast + reliable)
    resolver 8.8.8.8 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # Usa o FQDN Coolify do backend para evitar conflito de DNS no Docker
        # (o nome generico "backend:8000" resolvia para outro servico no mesmo servidor)
        set $backend_upstream http://p48wo0s84gw800s00ssoo4k8.72.61.223.16.sslip.io;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host p48wo0s84gw800s00ssoo4k8.72.61.223.16.sslip.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        client_max_body_size 10m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;
}
